databases:
  - name: my-django-db
    plan: free

services:
  - type: web
    name: gappx
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn jinjapro3.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-django-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"